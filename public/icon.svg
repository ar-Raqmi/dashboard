<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a2e1a"/>
      <stop offset="1" stop-color="#022c22"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Solid background for the entire canvas -->
  <rect width="512" height="512" fill="url(#bg_grad)"/>
  
  <!-- Icon content centered with 20% safe zone padding -->
  <g transform="translate(256, 256) scale(0.8)" filter="url(#shadow)">
    <!-- Brackets -->
    <path d="M-120 -100 L-180 0 L-120 100" stroke="white" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M120 -100 L180 0 L120 100" stroke="white" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Slash -->
    <path d="M40 -140 L-40 140" stroke="#4ade80" stroke-width="42" stroke-linecap="round" fill="none" />
  </g>
  
  <!-- Subtle glass shine overlay -->
  <rect width="512" height="512" fill="url(#shine)" opacity="0.1"/>
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="white"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
